                <!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAPZONE</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; }
    .shop { min-height: 100vh; background: #0a0a0a; color: #fff; font-family: 'DM Sans', sans-serif; }
    .header { display: flex; align-items: center; justify-content: space-between; padding: 1.5rem 2.5rem; border-bottom: 1px solid rgba(255,255,255,0.08); position: sticky; top: 0; z-index: 50; background: rgba(10,10,10,0.95); backdrop-filter: blur(12px); }
    .logo { font-family: 'Bebas Neue', cursive; font-size: 2.2rem; letter-spacing: 0.1em; background: linear-gradient(90deg, #fff 60%, #aaa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .hero { text-align: center; padding: 6rem 1.5rem 4rem; }
    .hero h2 { font-family: 'Bebas Neue', cursive; font-size: clamp(3rem, 10vw, 7rem); line-height: 1; letter-spacing: 0.02em; margin-bottom: 1.2rem; }
    .hero p { color: rgba(255,255,255,0.55); font-size: 1.1rem; max-width: 36rem; margin: 0 auto; line-height: 1.6; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.8rem; padding: 0 2.5rem 5rem; max-width: 1200px; margin: 0 auto; }
    .card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 1.5rem; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; }
    .card:hover { transform: translateY(-6px); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
    .card-img-wrap { position: relative; }
    .card-img-wrap img { width: 100%; height: 280px; object-fit: cover; display: block; background: #1a1a1a; }
    .card-tag { position: absolute; top: 12px; left: 12px; background: #e63946; color: #fff; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 10px; border-radius: 999px; }
    .card-body { padding: 1.4rem; }
    .card-body h3 { font-size: 1.2rem; font-weight: 600; margin-bottom: 0.3rem; }
    .card-body .sub { color: rgba(255,255,255,0.45); font-size: 0.85rem; margin-bottom: 1rem; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; }
    .price { font-family: 'Bebas Neue', cursive; font-size: 1.8rem; letter-spacing: 0.05em; }
    .buy-btn { background: #fff; color: #000; border: none; padding: 0.55rem 1.2rem; border-radius: 0.75rem; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.9rem; cursor: pointer; text-decoration: none; display: inline-block; transition: transform 0.15s; }
    .buy-btn:hover { transform: scale(1.07); background: #e0e0e0; }
    .soon-btn { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.4); border: none; padding: 0.55rem 1.2rem; border-radius: 0.75rem; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.9rem; cursor: not-allowed; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; display: flex; align-items: flex-start; justify-content: center; overflow-y: auto; padding: 2rem 1rem; }
    .modal { background: #111; border: 1px solid rgba(255,255,255,0.1); border-radius: 1.5rem; max-width: 700px; width: 100%; padding: 2rem; position: relative; }
    .modal h2 { font-family: 'Bebas Neue', cursive; font-size: 2rem; margin-bottom: 1.5rem; letter-spacing: 0.05em; }
    .modal h3 { font-size: 1.1rem; font-weight: 600; margin: 1.5rem 0 0.5rem; color: #fff; }
    .modal p, .modal li { color: rgba(255,255,255,0.65); font-size: 0.9rem; line-height: 1.7; }
    .modal ul { padding-left: 1.2rem; }
    .modal-close { position: absolute; top: 1rem; right: 1rem; background: rgba(255,255,255,0.1); border: none; color: #fff; width: 36px; height: 36px; border-radius: 50%; font-size: 1.1rem; cursor: pointer; }
    .footer { border-top: 1px solid rgba(255,255,255,0.08); padding: 2.5rem; text-align: center; }
    .footer-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 1.5rem; margin-bottom: 1rem; }
    .footer-links button { background: none; border: none; color: rgba(255,255,255,0.5); font-family: 'DM Sans', sans-serif; font-size: 0.85rem; cursor: pointer; text-decoration: underline; }
    .footer-links button:hover { color: #fff; }
    .footer-copy { color: rgba(255,255,255,0.25); font-size: 0.8rem; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const PRODUCTS = [
      { id: 1, name: "Casquette Vintage Washed Noire", price: 24.99, image: "https://i.imgur.com/WtrxWcL.jpeg", tag: "Bestseller", stripeLink: "https://buy.stripe.com/test_28EcN40TEfbN2v69ALbZe00" },
      { id: 2, name: "Casquette NY Noir et Or", price: 29.99, image: "https://i.imgur.com/ccmvXHT.jpeg", tag: "Nouveau", stripeLink: null },
      { id: 3, name: "Casquette Distressed Grise", price: 19.99, image: "https://i.imgur.com/MGg4Ke5.jpeg", tag: "Tendance", stripeLink: null },
    ];

    function App() {
      const [modal, setModal] = useState(null);

      const pages = {
        mentions: { title: "Mentions Legales", body: "<h3>Editeur du site</h3><p>Nom : Abdeladim Nouri<br/>Ville : Gif-sur-Yvette, France<br/>Email : mec7gmail.com@gmail.com</p><h3>Hebergement</h3><p>Netlify, Inc. 512 2nd Street, San Francisco, CA 94107, USA.</p>" },
        cgv: { title: "Conditions Generales de Vente", body: "<h3>1. Objet</h3><p>Vente de casquettes par Abdeladim Nouri, Gif-sur-Yvette.</p><h3>2. Prix</h3><p>Prix en euros TTC.</p><h3>3. Paiement</h3><p>Via Stripe, plateforme securisee.</p><h3>4. Livraison</h3><p>3 a 5 jours ouvres.</p><h3>5. Retractation</h3><p>14 jours a compter de la reception.</p><h3>Contact</h3><p>mec7gmail.com@gmail.com</p>" },
        confidentialite: { title: "Politique de Confidentialite", body: "<h3>Donnees collectees</h3><p>Nom, email, adresse de livraison lors d une commande.</p><h3>Utilisation</h3><p>Uniquement pour traiter votre commande.</p><h3>Vos droits</h3><p>RGPD : mec7gmail.com@gmail.com</p>" },
        retour: { title: "Politique de Retour", body: "<h3>Delai</h3><p>14 jours apres reception.</p><h3>Conditions</h3><p>Article non porte, non lave, emballage d origine.</p><h3>Remboursement</h3><p>Sous 14 jours apres reception du retour.</p><h3>Contact</h3><p>mec7gmail.com@gmail.com</p>" }
      };

      return (
        <>
          <div className="shop">
            <header className="header">
              <div className="logo">CAPZONE</div>
            </header>
            <section className="hero">
              <h2>Les meilleures<br />casquettes</h2>
              <p>Streetwear, vintage et sport. Trouve le style parfait pour ton outfit.</p>
            </section>
            <section className="grid">
              {PRODUCTS.map(product => (
                <div className="card" key={product.id}>
                  <div className="card-img-wrap">
                    <img src={product.image} alt={product.name} />
                    <span className="card-tag">{product.tag}</span>
                  </div>
                  <div className="card-body">
                    <h3>{product.name}</h3>
                    <p className="sub">Casquette tendance premium.</p>
                    <div className="card-footer">
                      <span className="price">{product.price.toFixed(2)}€</span>
                      {product.stripeLink
                        ? <a href={product.stripeLink} target="_blank" className="buy-btn">Acheter</a>
                        : <button className="soon-btn">Bientot</button>
                      }
                    </div>
                  </div>
                </div>
              ))}
            </section>
            <footer className="footer">
              <div className="footer-links">
                <button onClick={() => setModal('mentions')}>Mentions legales</button>
                <button onClick={() => setModal('cgv')}>CGV</button>
                <button onClick={() => setModal('confidentialite')}>Confidentialite</button>
                <button onClick={() => setModal('retour')}>Retours</button>
              </div>
              <div className="footer-copy">2026 CAPZONE - Tous droits reserves</div>
            </footer>
          </div>
          {modal && (
            <div className="modal-overlay" onClick={() => setModal(null)}>
              <div className="modal" onClick={e => e.stopPropagation()}>
                <button className="modal-close" onClick={() => setModal(null)}>X</button>
                <h2>{pages[modal].title}</h2>
                <div dangerouslySetInnerHTML={{__html: pages[modal].body}} />
              </div>
            </div>
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
