<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAPZONE</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; }
    .shop { min-height: 100vh; background: #0a0a0a; color: #fff; font-family: 'DM Sans', sans-serif; }
    .header { display: flex; align-items: center; justify-content: space-between; padding: 1.5rem 2.5rem; border-bottom: 1px solid rgba(255,255,255,0.08); position: sticky; top: 0; z-index: 50; background: rgba(10,10,10,0.95); backdrop-filter: blur(12px); }
    .logo { font-family: 'Bebas Neue', cursive; font-size: 2.2rem; letter-spacing: 0.1em; background: linear-gradient(90deg, #fff 60%, #aaa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .hero { text-align: center; padding: 6rem 1.5rem 4rem; }
    .hero h2 { font-family: 'Bebas Neue', cursive; font-size: clamp(3rem, 10vw, 7rem); line-height: 1; letter-spacing: 0.02em; margin-bottom: 1.2rem; }
    .hero p { color: rgba(255,255,255,0.55); font-size: 1.1rem; max-width: 36rem; margin: 0 auto; line-height: 1.6; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.8rem; padding: 0 2.5rem 5rem; max-width: 1200px; margin: 0 auto; }
    .card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 1.5rem; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; }
    .card:hover { transform: translateY(-6px); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
    .card-img-wrap { position: relative; }
    .card-img-wrap img { width: 100%; height: 280px; object-fit: cover; display: block; }
    .card-tag { position: absolute; top: 12px; left: 12px; background: #e63946; color: #fff; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 10px; border-radius: 999px; }
    .card-body { padding: 1.4rem; }
    .card-body h3 { font-size: 1.2rem; font-weight: 600; margin-bottom: 0.3rem; }
    .card-body .sub { color: rgba(255,255,255,0.45); font-size: 0.85rem; margin-bottom: 1rem; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; }
    .price { font-family: 'Bebas Neue', cursive; font-size: 1.8rem; letter-spacing: 0.05em; }
    .buy-btn { background: #fff; color: #000; border: none; padding: 0.55rem 1.2rem; border-radius: 0.75rem; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.9rem; cursor: pointer; text-decoration: none; display: inline-block; transition: transform 0.15s, background 0.15s; }
    .buy-btn:hover { transform: scale(1.07); background: #e0e0e0; }
    .soon-btn { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.4); border: none; padding: 0.55rem 1.2rem; border-radius: 0.75rem; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.9rem; cursor: not-allowed; }
    .footer { border-top: 1px solid rgba(255,255,255,0.08); text-align: center; padding: 2.5rem; color: rgba(255,255,255,0.3); font-size: 0.85rem; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">

    const PRODUCTS = [
      {
        id: 1,
        name: "Casquette Street Black",
        price: 24.99,
        image: "https://images.unsplash.com/photo-1521369909029-2afed882baee?q=80&w=1200&auto=format&fit=crop",
        tag: "Bestseller",
        stripeLink: "https://buy.stripe.com/test_28EcN40TEfbN2v69ALbZe00"
      },
      {
        id: 2,
        name: "Casquette Vintage Beige",
        price: 29.99,
        image: "https://images.unsplash.com/photo-1514327605112-b887c0e61c0a?q=80&w=1200&auto=format&fit=crop",
        tag: "Nouveau",
        stripeLink: null
      },
      {
        id: 3,
        name: "Casquette Sport White",
        price: 19.99,
        image: "https://images.unsplash.com/photo-1575428652377-a2d80e2277fc?q=80&w=1200&auto=format&fit=crop",
        tag: "Promo",
        stripeLink: null
      },
    ];

    function App() {
      return (
        <div className="shop">
          <header className="header">
            <div className="logo">CAPZONE</div>
          </header>
          <section className="hero">
            <h2>Les meilleures<br />casquettes</h2>
            <p>Streetwear, vintage et sport. Trouve le style parfait pour ton outfit.</p>
          </section>
          <section className="grid">
            {PRODUCTS.map(product => (
              <div className="card" key={product.id}>
                <div className="card-img-wrap">
                  <img src={product.image} alt={product.name} />
                  <span className="card-tag">{product.tag}</span>
                </div>
                <div className="card-body">
                  <h3>{product.name}</h3>
                  <p className="sub">Casquette tendance premium.</p>
                  <div className="card-footer">
                    <span className="price">{product.price.toFixed(2)}€</span>
                    {product.stripeLink
                      ? <a href={product.stripeLink} target="_blank" className="buy-btn">🛒 Acheter</a>
                      : <button className="soon-btn">Bientôt</button>
                    }
                  </div>
                </div>
              </div>
            ))}
          </section>
          <footer className="footer">© 2026 CAPZONE — Tous droits réservés</footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
