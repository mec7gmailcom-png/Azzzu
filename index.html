<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAPZONE</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; }
    .shop { min-height: 100vh; background: #0a0a0a; color: #fff; font-family: 'DM Sans', sans-serif; }
    .header { display: flex; align-items: center; justify-content: space-between; padding: 1.5rem 2.5rem; border-bottom: 1px solid rgba(255,255,255,0.08); position: sticky; top: 0; z-index: 50; background: rgba(10,10,10,0.95); backdrop-filter: blur(12px); }
    .logo { font-family: 'Bebas Neue', cursive; font-size: 2.2rem; letter-spacing: 0.1em; background: linear-gradient(90deg, #fff 60%, #aaa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .cart-btn { position: relative; background: #fff; color: #000; border: none; padding: 0.6rem 1.4rem; border-radius: 999px; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; }
    .cart-btn:hover { transform: scale(1.05); box-shadow: 0 4px 20px rgba(255,255,255,0.15); }
    .badge { position: absolute; top: -6px; right: -6px; background: #e63946; color: #fff; border-radius: 50%; width: 20px; height: 20px; font-size: 0.7rem; font-weight: 700; display: flex; align-items: center; justify-content: center; }
    .hero { text-align: center; padding: 6rem 1.5rem 4rem; }
    .hero h2 { font-family: 'Bebas Neue', cursive; font-size: clamp(3rem, 10vw, 7rem); line-height: 1; letter-spacing: 0.02em; margin-bottom: 1.2rem; }
    .hero p { color: rgba(255,255,255,0.55); font-size: 1.1rem; max-width: 36rem; margin: 0 auto; line-height: 1.6; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.8rem; padding: 0 2.5rem 5rem; max-width: 1200px; margin: 0 auto; }
    .card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 1.5rem; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; }
    .card:hover { transform: translateY(-6px); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
    .card-img-wrap { position: relative; }
    .card-img-wrap img { width: 100%; height: 280px; object-fit: cover; display: block; }
    .card-tag { position: absolute; top: 12px; left: 12px; background: #e63946; color: #fff; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 10px; border-radius: 999px; }
    .card-body { padding: 1.4rem; }
    .card-body h3 { font-size: 1.2rem; font-weight: 600; margin-bottom: 0.3rem; }
    .card-body .sub { color: rgba(255,255,255,0.45); font-size: 0.85rem; margin-bottom: 1rem; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; }
    .price { font-family: 'Bebas Neue', cursive; font-size: 1.8rem; letter-spacing: 0.05em; }
    .add-btn { background: #fff; color: #000; border: none; padding: 0.55rem 1.2rem; border-radius: 0.75rem; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: transform 0.15s, background 0.15s; }
    .add-btn:hover { transform: scale(1.07); background: #e0e0e0; }
    .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 0.8rem 1.8rem; border-radius: 999px; font-weight: 600; font-size: 0.95rem; box-shadow: 0 8px 30px rgba(0,0,0,0.4); z-index: 200; animation: fadeUp 0.3s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translate(-50%, 16px); } to { opacity: 1; transform: translate(-50%, 0); } }
    .order-confirm { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; border: 1px solid rgba(255,255,255,0.15); border-radius: 1.5rem; padding: 3rem 2.5rem; text-align: center; z-index: 300; box-shadow: 0 30px 80px rgba(0,0,0,0.7); animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes popIn { from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
    .order-confirm .check { font-size: 3rem; margin-bottom: 1rem; }
    .order-confirm h3 { font-family: 'Bebas Neue', cursive; font-size: 2rem; margin-bottom: 0.5rem; }
    .order-confirm p { color: rgba(255,255,255,0.55); }
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 90; backdrop-filter: blur(4px); }
    .drawer { position: fixed; top: 0; right: 0; bottom: 0; width: 380px; max-width: 100vw; background: #111; border-left: 1px solid rgba(255,255,255,0.08); z-index: 100; display: flex; flex-direction: column; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    .drawer-header { display: flex; align-items: center; justify-content: space-between; padding: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .drawer-header h2 { font-family: 'Bebas Neue', cursive; font-size: 1.6rem; letter-spacing: 0.05em; }
    .close-btn { background: rgba(255,255,255,0.08); border: none; color: #fff; width: 36px; height: 36px; border-radius: 50%; font-size: 1.1rem; cursor: pointer; }
    .drawer-items { flex: 1; overflow-y: auto; padding: 1rem 1.5rem; }
    .empty-cart { text-align: center; color: rgba(255,255,255,0.35); margin-top: 4rem; font-size: 0.95rem; }
    .cart-item { display: flex; align-items: center; gap: 1rem; padding: 0.9rem 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .cart-item img { width: 64px; height: 64px; object-fit: cover; border-radius: 0.75rem; }
    .cart-item-info { flex: 1; }
    .item-name { font-weight: 600; font-size: 0.9rem; margin-bottom: 0.2rem; }
    .item-price { color: rgba(255,255,255,0.5); font-size: 0.8rem; }
    .qty-controls { display: flex; align-items: center; gap: 0.5rem; }
    .qty-btn { background: rgba(255,255,255,0.1); border: none; color: #fff; width: 28px; height: 28px; border-radius: 50%; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .qty-num { font-weight: 600; min-width: 18px; text-align: center; }
    .remove-btn { background: none; border: none; color: rgba(255,255,255,0.3); font-size: 1.1rem; cursor: pointer; padding: 0.2rem; }
    .drawer-footer { padding: 1.5rem; border-top: 1px solid rgba(255,255,255,0.08); }
    .total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.2rem; }
    .total-row span { color: rgba(255,255,255,0.55); font-size: 0.95rem; }
    .total-row strong { font-family: 'Bebas Neue', cursive; font-size: 1.8rem; letter-spacing: 0.05em; }
    .order-btn { width: 100%; background: #fff; color: #000; border: none; padding: 1rem; border-radius: 1rem; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 1rem; cursor: pointer; }
    .order-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .footer { border-top: 1px solid rgba(255,255,255,0.08); text-align: center; padding: 2.5rem; color: rgba(255,255,255,0.3); font-size: 0.85rem; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const PRODUCTS = [
      { id: 1, name: "Casquette Street Black", price: 24.99, image: "https://images.unsplash.com/photo-1521369909029-2afed882baee?q=80&w=1200&auto=format&fit=crop", tag: "Bestseller" },
      { id: 2, name: "Casquette Vintage Beige", price: 29.99, image: "https://images.unsplash.com/photo-1514327605112-b887c0e61c0a?q=80&w=1200&auto=format&fit=crop", tag: "Nouveau" },
      { id: 3, name: "Casquette Sport White", price: 19.99, image: "https://images.unsplash.com/photo-1575428652377-a2d80e2277fc?q=80&w=1200&auto=format&fit=crop", tag: "Promo" },
    ];

    function App() {
      const [cart, setCart] = useState([]);
      const [cartOpen, setCartOpen] = useState(false);
      const [addedMsg, setAddedMsg] = useState(null);
      const [ordered, setOrdered] = useState(false);

      const addToCart = (product) => {
        setCart(prev => {
          const exists = prev.find(i => i.id === product.id);
          if (exists) return prev.map(i => i.id === product.id ? { ...i, quantity: i.quantity + 1 } : i);
          return [...prev, { ...product, quantity: 1 }];
        });
        setAddedMsg(product.name);
        setTimeout(() => setAddedMsg(null), 1500);
      };

      const updateQty = (id, delta) => {
        setCart(prev => prev.map(i => i.id === id ? { ...i, quantity: i.quantity + delta } : i).filter(i => i.quantity > 0));
      };

      const removeFromCart = (id) => setCart(prev => prev.filter(i => i.id !== id));

      const total = cart.reduce((s, i) => s + i.price * i.quantity, 0);
      const totalItems = cart.reduce((s, i) => s + i.quantity, 0);

      const handleOrder = () => {
        setOrdered(true);
        setCart([]);
        setCartOpen(false);
        setTimeout(() => setOrdered(false), 3000);
      };

      return (
        <>
          <div className="shop">
            <header className="header">
              <div className="logo">CAPZONE</div>
              <button className="cart-btn" onClick={() => setCartOpen(true)}>
                🛒 Panier
                {totalItems > 0 && <span className="badge">{totalItems}</span>}
              </button>
            </header>
            <section className="hero">
              <h2>Les meilleures<br />casquettes</h2>
              <p>Streetwear, vintage et sport. Trouve le style parfait pour ton outfit.</p>
            </section>
            <section className="grid">
              {PRODUCTS.map(product => (
                <div className="card" key={product.id}>
                  <div className="card-img-wrap">
                    <img src={product.image} alt={product.name} />
                    <span className="card-tag">{product.tag}</span>
                  </div>
                  <div className="card-body">
                    <h3>{product.name}</h3>
                    <p className="sub">Casquette tendance premium.</p>
                    <div className="card-footer">
                      <span className="price">{product.price.toFixed(2)}€</span>
                      <button className="add-btn" onClick={() => addToCart(product)}>+ Ajouter</button>
                    </div>
                  </div>
                </div>
              ))}
            </section>
            <footer className="footer">© 2026 CAPZONE — Tous droits réservés</footer>
          </div>

          {addedMsg && <div className="toast">✓ {addedMsg} ajouté au panier</div>}

          {ordered && (
            <div className="order-confirm">
              <div className="check">✅</div>
              <h3>Commande confirmée !</h3>
              <p>Merci pour ton achat. Livraison sous 3–5 jours.</p>
            </div>
          )}

          {cartOpen && (
            <>
              <div className="overlay" onClick={() => setCartOpen(false)} />
              <div className="drawer">
                <div className="drawer-header">
                  <h2>Mon panier ({totalItems})</h2>
                  <button className="close-btn" onClick={() => setCartOpen(false)}>✕</button>
                </div>
                <div className="drawer-items">
                  {cart.length === 0
                    ? <p className="empty-cart">Ton panier est vide.<br />Ajoute des casquettes ! 🧢</p>
                    : cart.map(item => (
                      <div className="cart-item" key={item.id}>
                        <img src={item.image} alt={item.name} />
                        <div className="cart-item-info">
                          <div className="item-name">{item.name}</div>
                          <div className="item-price">{(item.price * item.quantity).toFixed(2)}€</div>
                        </div>
                        <div className="qty-controls">
                          <button className="qty-btn" onClick={() => updateQty(item.id, -1)}>−</button>
                          <span className="qty-num">{item.quantity}</span>
                          <button className="qty-btn" onClick={() => updateQty(item.id, +1)}>+</button>
                        </div>
                        <button className="remove-btn" onClick={() => removeFromCart(item.id)}>🗑</button>
                      </div>
                    ))
                  }
                </div>
                <div className="drawer-footer">
                  <div className="total-row">
                    <span>Total</span>
                    <strong>{total.toFixed(2)}€</strong>
                  </div>
                  <button className="order-btn" disabled={cart.length === 0} onClick={handleOrder}>
                    Commander →
                  </button>
                </div>
              </div>
            </>
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
